services:
  mysql:
    image: mysql:8.4
    container_name: lab7-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: lab7_java6
      MYSQL_USER: lab7
      MYSQL_PASSWORD: lab7pass
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass" ]
      interval: 10s
      timeout: 5s
      retries: 15

volumes:
  mysql_data:
