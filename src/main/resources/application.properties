spring.application.name=Lab7_Java6

# MySQL config (run with docker-compose in project root)
spring.datasource.url=jdbc:mysql://localhost:3306/lab7_java6?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=lab7
spring.datasource.password=lab7pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
server.port=8081

